# ResearchShop Disease2Gene Pipeline
# Docker Compose configuration for easy deployment

services:
  disease2gene:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: disease2gene-pipeline

    # Environment variables - loaded from .env file in project root
    env_file:
      - ../.env

    # Override specific environment variables
    environment:
      - OUTPUT_DIR=/app/data/output
      - PYTHONUNBUFFERED=1
      - PORT=8050
      # Performance tuning
      - FETCH_MAX_WORKERS=3
      - FETCH_THREAD_TIMEOUT=120
      - AI_PER_PAPER_TIMEOUT_SECONDS=600

    # Mount volumes for persistent data
    volumes:
      # Output directory - results persist after container stops
      - ../data/output:/app/data/output
      # Reference data (HGNC database, journal tiers)
      - ../data/reference:/app/data/reference

    # Expose the web GUI
    ports:
      - "8050:8050"

    # Resource limits (optional, adjust based on your system)
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

# Example usage:
#
# 1. Create .env file in the project root with required variables:
#    GEMINI_API_KEY=your_key_here
#    ENTREZ_EMAIL=your.email@example.com
#
# 2. Build and run:
#    cd docker
#    docker-compose up --build
#
# 3. Open the web GUI:
#    http://localhost:8050
#
# 4. Stop:
#    docker-compose down
