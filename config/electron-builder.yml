publish:
  provider: github
  owner: michaluppal
  repo: Researchshop-Disease2Gene
afterPack: app/scripts/afterpack.js
appId: com.researchshop.desktop
productName: ResearchShop
directories:
  buildResources: app/resources
  output: dist
files:
  - '!**/.vscode/*'
  - '!app/src/*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!config/**/*'
  - '!docs/**/*'
  - '!publication/**/*'
extraResources:
  - from: pipeline
    to: pipeline
    filter:
      - run_pipeline.py
      - requirements.txt
      - pyproject.toml
      - modules/**/*
      - data/reference/**/*
      - '!tests/**'
      - '!scripts/**'
      - '!data/benchmark/**'
      - '!data/gold_standard/**'
      - '!data/gold-standard/**'
      - '!data/output/**'
      - '!data/outputs/**'
      - '!docs/**'
      - '!cache/**'
      - '!caches/**'
      - '!outputs/**'
      - '!.venv/**'
      - '!**/__pycache__/**'
      - '!**/*.pyc'
mac:
  icon: app/resources/icon.icns
  extendInfo:
    NSDocumentsFolderUsageDescription: ResearchShop needs access to save research results.
  notarize: false
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
win:
  icon: app/resources/icon.ico
  target:
    - nsis
    - zip
linux:
  icon: app/resources/icon.png
  maintainer: "ResearchShop <researchshop@users.noreply.github.com>"
  target:
    - AppImage
    - deb
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
dmg:
  artifactName: ${name}-${version}.${ext}
  background: app/resources/dmg-background.png
  icon: app/resources/icon.icns
  iconSize: 128
  contents:
    - x: 150
      y: 200
      type: file
    - x: 510
      y: 200
      type: link
      path: /Applications
  window:
    width: 660
    height: 400
