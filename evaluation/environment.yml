# Conda environment for ResearchShop evaluation notebook
# 
# Create environment:
#   conda env create -f environment.yml
#
# Activate:
#   conda activate researchshop-eval
#
# Register as Jupyter kernel:
#   python -m ipykernel install --user --name researchshop-eval --display-name "ResearchShop Eval"

name: researchshop-eval
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11
  
  # Jupyter
  - jupyter
  - ipykernel
  - notebook
  
  # Data processing
  - pandas=1.5.3
  - numpy=1.23.5
  
  # Visualization
  - matplotlib
  - seaborn
  
  # Statistics
  - scipy
  
  # Other core dependencies
  - requests
  - tqdm
  - biopython
  
  # Pip dependencies (not available in conda or need specific versions)
  - pip
  - pip:
    - google-genai==1.24.0
    - trafilatura==1.6.2
    - ratelimit==2.2.1
    - playwright==1.44.0
    - beautifulsoup4==4.12.2
    - python-dotenv==1.0.0

