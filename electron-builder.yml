publish:
  provider: github
  owner: michaluppal
  repo: RS_SOFTWAREX
afterPack: app/scripts/afterpack.js
appId: com.researchshop.desktop
productName: ResearchShop
directories:
  buildResources: app/resources
  output: dist
files:
  - '!**/.vscode/*'
  - '!app/src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{AUDIT.md,ROADMAP.md,CLAUDE.md}'
  - '!docs/**/*'
  - '!publication/**/*'
  - '!.claude/**/*'
extraResources:
  - from: pipeline
    to: pipeline
    filter:
      - '**/*'
      - '!.venv/**'
      - '!__pycache__/**'
      - '!**/*.pyc'
      - '!**/__pycache__/**'
mac:
  icon: app/resources/icon.icns
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSDocumentsFolderUsageDescription: ResearchShop needs access to save research results.
  notarize: false
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
win:
  icon: app/resources/icon.ico
  target:
    - nsis
    - zip
linux:
  icon: app/resources/icon.png
  maintainer: "ResearchShop <researchshop@users.noreply.github.com>"
  target:
    - AppImage
    - deb
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
dmg:
  artifactName: ${name}-${version}.${ext}
  background: app/resources/dmg-background.png
  icon: app/resources/icon.icns
  iconSize: 128
  contents:
    - x: 150
      y: 200
      type: file
    - x: 510
      y: 200
      type: link
      path: /Applications
  window:
    width: 660
    height: 400
