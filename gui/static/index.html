<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disease2Gene — Research Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8fafc; --bg-card: #fff; --border: #e2e8f0;
  --text: #0f172a; --text-muted: #64748b; --text-light: #94a3b8;
  --brand: #2563eb; --brand-dark: #1d4ed8; --brand-light: #eff6ff; --brand-ring: #dbeafe;
  --green: #16a34a; --green-bg: #f0fdf4; --green-border: #bbf7d0;
  --red: #dc2626; --red-bg: #fef2f2;
  --purple: #7c3aed; --purple-bg: #f5f3ff; --purple-border: #ddd6fe;
  --orange: #ea580c; --orange-bg: #fff7ed; --orange-border: #fed7aa;
  --radius: 12px; --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,.05), 0 2px 4px rgba(0,0,0,.03);
  --shadow-lg: 0 10px 15px rgba(0,0,0,.07), 0 4px 6px rgba(0,0,0,.04);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
.container { max-width: 860px; margin: 0 auto; padding: 32px 24px; }
.container-wide { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

/* Cards */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 16px; box-shadow: var(--shadow); transition: box-shadow .2s; }
.card:hover { box-shadow: var(--shadow-md); }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 600; font-size: 14px; cursor: pointer; border: 1px solid transparent; transition: all .15s; text-decoration: none; font-family: inherit; }
.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--brand); color: #fff; }
.btn-primary:hover { background: var(--brand-dark); }
.btn-green { background: var(--green); color: #fff; }
.btn-green:hover { background: #15803d; }
.btn-ghost { background: transparent; color: var(--text-muted); border-color: var(--border); }
.btn-ghost:hover { background: var(--bg); color: var(--text); }
.btn-danger { background: var(--red); color: #fff; }
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-lg { padding: 16px 36px; font-size: 18px; border-radius: var(--radius); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* Inputs */
input[type="text"], input[type="number"], input[type="password"], textarea, select { width: 100%; padding: 10px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-family: inherit; font-size: 14px; background: var(--bg-card); color: var(--text); transition: border-color .15s; outline: none; }
input:focus, textarea:focus, select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-ring); }
textarea { resize: vertical; min-height: 80px; }
select { appearance: none; cursor: pointer; }

.label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; display: block; }
.label-sm { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
.hint { font-size: 12px; color: var(--text-light); margin-top: 2px; }

/* Badge */
.badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; font-family: 'SF Mono', 'Fira Code', monospace; }
.badge-brand { background: var(--brand-light); color: var(--brand); border: 1px solid var(--brand-ring); }
.badge-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.badge-purple { background: var(--purple-bg); color: var(--purple); border: 1px solid var(--purple-border); }
.badge-orange { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }

/* Protocol cards */
.protocol-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
.protocol-card { padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-card); cursor: pointer; transition: all .2s; text-align: left; }
.protocol-card:hover { border-color: var(--brand); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.protocol-card .emoji { font-size: 28px; margin-bottom: 8px; }
.protocol-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.protocol-card p { font-size: 13px; color: var(--text-muted); }

/* Condition rows */
.cond-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.cond-row select { width: 100px; flex-shrink: 0; }
.cond-row input { flex: 1; }
.cond-row .field-select { width: 140px; flex-shrink: 0; }

/* Query preview */
.query-preview { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-top: 12px; }
.query-string { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; color: var(--brand); word-break: break-all; padding: 8px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; margin-top: 8px; min-height: 36px; }

/* Paper cards */
.paper-card { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; background: var(--bg-card); transition: all .15s; }
.paper-card:hover { border-color: var(--brand); box-shadow: var(--shadow); }
.paper-card.selected { background: var(--brand-light); border-color: #93c5fd; }
.paper-card input[type="checkbox"] { width: 18px; height: 18px; margin-top: 2px; flex-shrink: 0; cursor: pointer; accent-color: var(--brand); }
.paper-card .paper-info { flex: 1; min-width: 0; }
.paper-card .paper-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 4px; }
.paper-card .paper-meta { font-size: 12px; color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.paper-card .paper-meta a { color: var(--brand); text-decoration: none; font-weight: 500; }
.paper-card .paper-meta a:hover { text-decoration: underline; }

/* Author */
.author-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 8px; background: var(--bg); }
.author-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

/* Column rows */
.col-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.col-row input:first-child { width: 200px; flex-shrink: 0; }
.col-row input:nth-child(2) { flex: 1; }

/* Progress */
.step-track { display: flex; justify-content: space-between; margin-bottom: 20px; position: relative; }
.step-track::before { content: ''; position: absolute; top: 18px; left: 30px; right: 30px; height: 3px; background: var(--border); border-radius: 2px; z-index: 0; }
.step-item { display: flex; flex-direction: column; align-items: center; z-index: 1; flex: 1; }
.step-circle { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 14px; margin-bottom: 6px; transition: all .3s; }
.step-circle.active { border-color: var(--brand); background: var(--brand); color: #fff; }
.step-circle.done { border-color: var(--green); background: var(--green); color: #fff; }
.step-label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
.progress-bar { width: 100%; height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; margin: 12px 0; }
.progress-bar-inner { width: 30%; height: 100%; background: linear-gradient(90deg, var(--brand), var(--purple)); border-radius: 2px; animation: progress-indeterminate 1.5s infinite; }
@keyframes progress-indeterminate { 0% { transform: translateX(-100%); width: 30%; } 50% { width: 50%; } 100% { transform: translateX(400%); width: 30%; } }
.log-output { background: #1e293b; color: #e2e8f0; border-radius: var(--radius-sm); padding: 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.6; max-height: 350px; overflow-y: auto; white-space: pre-wrap; }

/* Results modal */
.results-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; overflow-y: auto; }
.results-header { position: sticky; top: 0; background: rgba(255,255,255,.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); z-index: 10; padding: 20px 32px; }
.results-footer { position: sticky; bottom: 0; background: rgba(255,255,255,.95); backdrop-filter: blur(8px); border-top: 1px solid var(--border); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }

/* Layout helpers */
.flex { display: flex; } .flex-between { justify-content: space-between; } .items-center { align-items: center; }
.gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .mt-2 { margin-top: 8px; } .mt-4 { margin-top: 16px; }
.mb-2 { margin-bottom: 8px; } .mb-4 { margin-bottom: 16px; }
.text-center { text-align: center; }
h1 { font-size: 28px; font-weight: 800; letter-spacing: -.025em; }
h2 { font-size: 20px; font-weight: 700; }
h3 { font-size: 16px; font-weight: 600; }
.subtitle { color: var(--text-muted); font-size: 15px; font-weight: 400; margin-top: 6px; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.hidden { display: none !important; }
.fade-in { animation: fadeIn .3s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="container" id="app"></div>
<!-- Topic results modal rendered outside main container -->
<div id="results-modal"></div>

<script>
// ── State ───────────────────────────────────────────────────────────
const S = {
  step: 'loading',
  config: {},
  protocol: { topic: false, papers: false, authors: false },
  protocolName: '',
  // Topic
  conditions: [{ operator: '', field: 'tiab', term: '' }],
  startYear: '', endYear: '',
  useRaw: false, rawQuery: '',
  topicCount: null,
  // Topic results (preview papers from search)
  topicResults: [],       // fetched papers with metadata
  topicSelected: new Set(), // selected PMIDs from topic results
  showingResults: false,
  // Papers
  pmidsText: '',
  resolvedPapers: [],
  // Authors
  authors: [],
  // Columns
  columns: [
    { name: 'Disease Association', desc: 'The disease or medical condition associated with this gene/variant' },
    { name: 'Key Finding', desc: 'Main research finding about this gene from the paper' },
    { name: 'Statistical Evidence', desc: 'P-values, odds ratios, or other statistical measures mentioned' },
    { name: 'Conclusion', desc: 'Author conclusions specifically about this gene or variant' },
  ],
  logs: [], pipelineResult: null, pipelineError: null,
};

const $app = document.getElementById('app');
const $modal = document.getElementById('results-modal');

// ── Init ────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/api/config');
    S.config = await res.json();
    S.step = (S.config.gemini_key && S.config.pubmed_email) ? 'protocol' : 'setup';
  } catch { S.step = 'setup'; }
  render();
}

// ── Render ──────────────────────────────────────────────────────────
function render() {
  const views = { setup: vSetup, protocol: vProtocol, inputs: vInputs, columns: vColumns, review: vReview, running: vRunning, done: vDone };
  $app.innerHTML = (views[S.step] || vProtocol)();
  $app.className = 'container fade-in';
  // Render results modal separately
  $modal.innerHTML = S.showingResults ? vTopicResultsModal() : '';
  afterRender();
}

function afterRender() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      actions[el.dataset.action]?.(el.dataset);
    });
  });
}

function go(step) { S.step = step; render(); }

// ── Actions ─────────────────────────────────────────────────────────
const actions = {
  async saveConfig() {
    const key = document.getElementById('gemini-key')?.value.trim();
    const email = document.getElementById('pubmed-email')?.value.trim();
    if (!key) return alert('Gemini API key is required');
    if (!email || !email.includes('@')) return alert('Valid email is required');
    S.config = { ...S.config, gemini_key: key, pubmed_email: email };
    await fetch('/api/config', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(S.config) });
    go('protocol');
  },
  selectProtocol({ topic, papers, authors, name }) {
    S.protocol = { topic: topic==='1', papers: papers==='1', authors: authors==='1' };
    S.protocolName = name;
    go('inputs');
  },
  addCondition() {
    saveInputs();
    S.conditions.push({ operator: 'AND', field: 'tiab', term: '' });
    render();
  },
  removeCond({ idx }) { saveInputs(); S.conditions.splice(+idx, 1); render(); },
  toggleRaw() { saveInputs(); S.useRaw = !S.useRaw; render(); },
  async fetchCount() {
    saveInputs();
    const q = buildQuery();
    if (!q) return;
    const el = document.getElementById('count-badge');
    if (el) el.textContent = 'Counting...';
    try {
      const res = await fetch(`/api/pubmed/count?query=${encodeURIComponent(q)}`);
      const data = await res.json();
      S.topicCount = data.count;
      if (el) el.textContent = `${data.count.toLocaleString()} papers found`;
    } catch (e) { if (el) el.textContent = 'Error'; }
  },
  testPubmed() { saveInputs(); const q = buildQuery(); if (q) window.open(`https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(q)}`, '_blank'); },

  // ── Topic Results Preview ──
  async previewResults() {
    saveInputs();
    const q = buildQuery();
    if (!q) return alert('Build a query first');
    S.showingResults = true;
    S.topicResults = [];
    render();
    try {
      const res = await fetch(`/api/pubmed/search?query=${encodeURIComponent(q)}&retmax=50`);
      const data = await res.json();
      S.topicResults = data.papers || [];
      S.topicCount = data.total;
      // Select all by default
      S.topicSelected = new Set(S.topicResults.map(p => p.pmid));
      render();
    } catch (e) { alert('Error fetching results: ' + e.message); }
  },
  closeResults() { S.showingResults = false; render(); },
  toggleTopicPaper({ pmid }) {
    if (S.topicSelected.has(pmid)) S.topicSelected.delete(pmid);
    else S.topicSelected.add(pmid);
    render();
  },
  selectAllTopic() {
    S.topicSelected = new Set(S.topicResults.map(p => p.pmid));
    render();
  },
  deselectAllTopic() { S.topicSelected.clear(); render(); },
  confirmTopicSelection() {
    // Add selected papers to resolved papers list
    S.topicResults.forEach(p => {
      if (S.topicSelected.has(p.pmid) && !S.resolvedPapers.find(r => r.pmid === p.pmid)) {
        S.resolvedPapers.push(p);
      }
    });
    S.showingResults = false;
    render();
  },

  // ── Papers Module ──
  async validatePmids() {
    const raw = document.getElementById('pmids-input')?.value || '';
    S.pmidsText = raw;
    const ids = raw.split(/[,\n\r;]+/).map(s => s.trim()).filter(Boolean);
    const pmids = ids.filter(x => /^\d+$/.test(x));
    const dois = ids.filter(x => x.startsWith('10.'));

    // Keep existing non-typed papers
    const existing = S.resolvedPapers.filter(p => !pmids.includes(p.pmid) && !dois.find(d => d === p.doi));

    const newPapers = [
      ...pmids.map(p => ({ pmid: p, title: `PMID:${p}`, url: `https://pubmed.ncbi.nlm.nih.gov/${p}` })),
      ...dois.map(d => ({ doi: d, title: `DOI:${d}`, url: `https://doi.org/${d}` })),
    ];
    S.resolvedPapers = [...existing, ...newPapers];
    const el = document.getElementById('pmid-status');
    if (el) el.textContent = `✓ ${newPapers.length} IDs parsed. Resolving titles...`;

    // Resolve via NCBI
    if (pmids.length) {
      try {
        const res = await fetch('/api/pubmed/resolve', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ pmids }) });
        const data = await res.json();
        if (data.papers) {
          data.papers.forEach(p => {
            const idx = S.resolvedPapers.findIndex(x => x.pmid === p.pmid);
            if (idx >= 0) S.resolvedPapers[idx] = { ...S.resolvedPapers[idx], ...p, url: `https://pubmed.ncbi.nlm.nih.gov/${p.pmid}` };
          });
        }
      } catch {}
    }
    render();
  },
  removePaper({ idx }) { S.resolvedPapers.splice(+idx, 1); render(); },

  // ── Authors Module ──
  async addAuthor() {
    const name = document.getElementById('author-name')?.value.trim();
    if (!name) return;
    const entry = { name, papers: [], selected: new Set(), status: 'Searching...' };
    S.authors.push(entry);
    render();
    try {
      const res = await fetch(`/api/pubmed/author?name=${encodeURIComponent(name)}`);
      const data = await res.json();
      entry.papers = (data.papers || []).map(p => ({ ...p, url: `https://pubmed.ncbi.nlm.nih.gov/${p.pmid}` }));
      entry.selected = new Set(entry.papers.map(p => p.pmid));
      entry.status = `${entry.papers.length} papers (${data.total || 0} total)`;
    } catch (e) { entry.status = `Error: ${e.message}`; }
    render();
  },
  removeAuthor({ idx }) { S.authors.splice(+idx, 1); render(); },
  togglePaper({ authoridx, pmid }) {
    const a = S.authors[+authoridx];
    if (a.selected.has(pmid)) a.selected.delete(pmid); else a.selected.add(pmid);
    render();
  },

  // ── Columns ──
  addColumn() { saveColumns(); S.columns.push({ name: `Column ${S.columns.length+1}`, desc: 'Describe what to extract' }); render(); },
  removeColumn({ idx }) { saveColumns(); S.columns.splice(+idx, 1); render(); },

  // ── Pipeline ──
  async runPipeline() {
    S.logs = []; S.pipelineResult = null; S.pipelineError = null;
    go('running');
    const pmids = getAllSelectedPmids();
    const columns = {};
    S.columns.forEach(c => { if (c.name) columns[c.name] = c.desc; });
    try {
      await fetch('/api/pipeline/run', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ gemini_key: S.config.gemini_key, email: S.config.pubmed_email, query: buildQuery(), pmids, authors: S.authors.map(a => a.name), columns }) });
      streamLogs();
    } catch (e) { S.logs.push(`Error: ${e.message}`); render(); }
  },
  async stopPipeline() { await fetch('/api/pipeline/stop', { method: 'POST' }); },
};

// ── Log streaming ───────────────────────────────────────────────────
function streamLogs() {
  const es = new EventSource('/api/pipeline/logs');
  es.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.log) { S.logs.push(data.log); const el = document.getElementById('log-output'); if (el) { el.textContent = S.logs.join('\n'); el.scrollTop = el.scrollHeight; } }
    if (data.done) { es.close(); S.pipelineResult = data.result; S.pipelineError = data.error; go('done'); }
  };
  es.onerror = () => { es.close(); };
}

// ── Helpers ─────────────────────────────────────────────────────────
function buildQuery() {
  if (S.useRaw) { let q = S.rawQuery.trim(); if (S.startYear || S.endYear) { const sy = S.startYear||'1900', ey = S.endYear||'3000'; q = q?`(${q}) AND ${sy}:${ey}[dp]`:`${sy}:${ey}[dp]`; } return q; }
  let parts = [];
  S.conditions.forEach((c, i) => { const t = c.term.trim(); if (!t) return; const tag = c.field?`[${c.field}]`:''; const piece = t.includes(' ')?`"${t}"${tag}`:`${t}${tag}`; parts.push(i===0?piece:`${c.operator} ${piece}`); });
  let q = parts.join(' ');
  if (S.startYear || S.endYear) { const sy = S.startYear||'1900', ey = S.endYear||'3000'; q = q?`(${q}) AND ${sy}:${ey}[dp]`:`${sy}:${ey}[dp]`; }
  return q;
}
function saveInputs() {
  document.querySelectorAll('[data-cond-idx]').forEach(row => { const i=+row.dataset.condIdx; if(S.conditions[i]){const op=row.querySelector('.cond-op'),term=row.querySelector('.cond-term'),field=row.querySelector('.cond-field');if(op)S.conditions[i].operator=op.value;if(term)S.conditions[i].term=term.value;if(field)S.conditions[i].field=field.value;}});
  const sy=document.getElementById('start-year'),ey=document.getElementById('end-year'),rq=document.getElementById('raw-query');
  if(sy)S.startYear=sy.value;if(ey)S.endYear=ey.value;if(rq)S.rawQuery=rq.value;
}
function saveColumns() { document.querySelectorAll('[data-col-idx]').forEach(row => { const i=+row.dataset.colIdx; if(S.columns[i]){S.columns[i].name=row.querySelector('.col-name')?.value||'';S.columns[i].desc=row.querySelector('.col-desc')?.value||'';}}); }
function getAllSelectedPmids() {
  const set = new Set();
  // From topic search
  S.topicSelected.forEach(id => set.add(id));
  // From specific papers
  S.resolvedPapers.forEach(p => { if (p.pmid) set.add(p.pmid); });
  // From authors
  S.authors.forEach(a => a.selected.forEach(id => set.add(id)));
  return [...set];
}
function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

// ── Reusable paper card with PubMed link ────────────────────────────
function paperCardHtml(paper, { checkbox = false, checked = false, onToggle = '', removable = false, removeAction = '', idx = 0 } = {}) {
  const url = paper.url || `https://pubmed.ncbi.nlm.nih.gov/${paper.pmid || ''}`;
  const title = paper.title || paper.pmid || paper.doi || 'Unknown';
  return `
    <div class="paper-card ${checked ? 'selected' : ''}">
      ${checkbox ? `<input type="checkbox" ${checked?'checked':''} ${onToggle}>` : ''}
      <div class="paper-info">
        <div class="paper-title">${esc(title)}</div>
        <div class="paper-meta">
          ${paper.year ? `<span class="badge badge-brand">${esc(paper.year)}</span>` : ''}
          ${paper.journal ? `<span>📄 ${esc(paper.journal)}</span>` : ''}
          ${paper.authors ? `<span>👤 ${esc(paper.authors)}</span>` : ''}
          ${paper.pmid ? `<a href="${esc(url)}" target="_blank" rel="noopener">PMID:${esc(paper.pmid)} ↗</a>` : ''}
          ${paper.doi ? `<a href="https://doi.org/${esc(paper.doi)}" target="_blank" rel="noopener">DOI ↗</a>` : ''}
        </div>
      </div>
      ${removable ? `<button class="btn btn-ghost btn-sm" ${removeAction} style="color:var(--red);flex-shrink:0">✕</button>` : ''}
    </div>`;
}

// ── Views ───────────────────────────────────────────────────────────

function vSetup() {
  return `
    <div class="text-center mb-4"><h1>🧬 Disease2Gene</h1><p class="subtitle">One-time setup — enter your API credentials</p></div>
    <div class="card">
      <label class="label">Gemini API Key</label>
      <p class="hint mb-2">Get free at <a href="https://ai.google.dev" target="_blank">ai.google.dev</a></p>
      <input type="password" id="gemini-key" placeholder="Enter your Gemini API key" value="${esc(S.config.gemini_key||'')}">
      <div class="mt-4"></div>
      <label class="label">PubMed Email</label>
      <p class="hint mb-2">Required by NCBI for API access</p>
      <input type="text" id="pubmed-email" placeholder="your.email@example.com" value="${esc(S.config.pubmed_email||'')}">
      <div class="mt-4 text-center">
        <button class="btn btn-green btn-lg" data-action="saveConfig">Save & Continue →</button>
      </div>
    </div>`;
}

function vProtocol() {
  return `
    <div class="flex flex-between items-center mb-4">
      <div><h1>Begin Research Protocol</h1><p class="subtitle">Select your entry vectors to begin the analysis pipeline.</p></div>
      <button class="btn btn-ghost btn-sm" onclick="go('setup')">⚙️ Settings</button>
    </div>
    <p class="label-sm mb-2">PREBUILT PROTOCOLS</p>
    <div class="protocol-grid">
      <div class="protocol-card" data-action="selectProtocol" data-topic="1" data-papers="1" data-authors="1" data-name="Full Protocol"><div class="emoji">🚀</div><h3>Full Protocol</h3><p>Topic + Authors + Papers</p></div>
      <div class="protocol-card" data-action="selectProtocol" data-topic="0" data-papers="0" data-authors="1" data-name="Author Discovery"><div class="emoji">👥</div><h3>Author Discovery</h3><p>Focus on specific researchers</p></div>
      <div class="protocol-card" data-action="selectProtocol" data-topic="0" data-papers="1" data-authors="0" data-name="Paper Analysis"><div class="emoji">📄</div><h3>Paper Analysis</h3><p>Analyze specific PMIDs / DOIs</p></div>
      <div class="protocol-card" data-action="selectProtocol" data-topic="0" data-papers="1" data-authors="1" data-name="Hybrid"><div class="emoji">🧬</div><h3>Hybrid</h3><p>Authors + Papers</p></div>
    </div>`;
}

function vInputs() {
  let html = `<div class="section-header"><div><h1>📋 ${esc(S.protocolName)}</h1></div><button class="btn btn-ghost btn-sm" onclick="saveInputs(); go('protocol')">← Back</button></div>`;
  if (S.protocol.topic) html += vTopicModule();
  if (S.protocol.papers) html += vPapersModule();
  if (S.protocol.authors) html += vAuthorsModule();
  html += `<div class="text-center mt-4"><button class="btn btn-primary btn-lg" onclick="saveInputs(); go('columns')">Next: Configure Columns →</button></div>`;
  return html;
}

function vTopicModule() {
  const q = buildQuery();
  let conditionsHtml = '';
  if (!S.useRaw) {
    S.conditions.forEach((c, i) => {
      conditionsHtml += `<div class="cond-row" data-cond-idx="${i}">
        <select class="cond-op" ${i===0?'disabled':''}><option value="">—</option><option value="AND" ${c.operator==='AND'?'selected':''}>AND</option><option value="OR" ${c.operator==='OR'?'selected':''}>OR</option><option value="NOT" ${c.operator==='NOT'?'selected':''}>NOT</option></select>
        <input type="text" class="cond-term" placeholder="e.g. cancer, BRCA1, COVID-19" value="${esc(c.term)}">
        <select class="cond-field field-select"><option value="tiab" ${c.field==='tiab'?'selected':''}>Title/Abstract</option><option value="ti" ${c.field==='ti'?'selected':''}>Title</option><option value="mh" ${c.field==='mh'?'selected':''}>MeSH Terms</option><option value="" ${c.field===''?'selected':''}>All Fields</option></select>
        ${i > 0 ? `<button class="btn btn-ghost btn-sm" data-action="removeCond" data-idx="${i}" style="color:var(--red)">✕</button>` : ''}
      </div>`;
    });
  }
  return `
    <div class="card">
      <div class="section-header"><div><h2>🔍 Topic Search</h2><p class="hint">Build a PubMed query using keywords</p></div><span class="badge badge-brand">Module: Topic</span></div>
      <div class="flex gap-2 mb-4">
        <button class="btn ${S.useRaw?'btn-ghost':'btn-primary'} btn-sm" data-action="toggleRaw">🔧 Query Builder</button>
        <button class="btn ${S.useRaw?'btn-primary':'btn-ghost'} btn-sm" data-action="toggleRaw" style="${S.useRaw?'background:var(--purple)':''}">⚡ Raw Query</button>
      </div>
      ${S.useRaw ? `<label class="label">PubMed Query</label><textarea id="raw-query" placeholder="(cancer OR tumor) AND (treatment OR therapy)">${esc(S.rawQuery)}</textarea><p class="hint">Full PubMed syntax: AND, OR, NOT, [tiab], [au], [mh]</p>` :
      `${conditionsHtml}<button class="btn btn-ghost btn-sm mt-2" data-action="addCondition">+ Add Keyword</button>`}
      <div class="flex gap-2 mt-4 mb-2">
        <label class="label" style="margin:auto 0">📅 From</label>
        <input type="number" id="start-year" placeholder="2020" value="${S.startYear}" style="width:90px">
        <label class="label" style="margin:auto 0">to</label>
        <input type="number" id="end-year" placeholder="2025" value="${S.endYear}" style="width:90px">
      </div>
      <div class="query-preview">
        <div class="flex flex-between items-center">
          <div class="flex gap-2 items-center">
            <span class="label-sm">Query Preview</span>
            <span class="badge badge-brand" id="count-badge">${S.topicCount !== null ? S.topicCount.toLocaleString()+' papers found' : ''}</span>
          </div>
          <div class="flex gap-2">
            <button class="btn btn-ghost btn-sm" data-action="fetchCount">🔎 Count</button>
            <button class="btn btn-primary btn-sm" data-action="previewResults">📋 Preview & Select</button>
            <button class="btn btn-ghost btn-sm" data-action="testPubmed" style="color:var(--brand)">PubMed ↗</button>
          </div>
        </div>
        <div class="query-string">${esc(q) || '<span style="color:var(--text-light);font-style:italic">Start adding keywords above...</span>'}</div>
      </div>
      ${S.topicSelected.size > 0 ? `<p class="hint mt-2" style="color:var(--green)">✓ ${S.topicSelected.size} papers selected from topic search</p>` : ''}
    </div>`;
}

function vTopicResultsModal() {
  const loading = S.topicResults.length === 0;
  let paperList = S.topicResults.map(p =>
    paperCardHtml(p, { checkbox: true, checked: S.topicSelected.has(p.pmid), onToggle: `data-action="toggleTopicPaper" data-pmid="${p.pmid}"` })
  ).join('');

  return `
    <div class="results-overlay fade-in">
      <div class="results-header">
        <div class="container-wide flex flex-between items-center">
          <div>
            <h1>Topic Search Results</h1>
            <p class="subtitle">Found ${(S.topicCount||0).toLocaleString()} papers. Showing ${S.topicResults.length}. Select papers to include in analysis.</p>
          </div>
          <button class="btn btn-ghost" data-action="closeResults">✕ Close</button>
        </div>
      </div>
      <div class="container-wide" style="padding-top:16px;padding-bottom:100px">
        ${loading ? `<div class="text-center" style="padding:60px 0"><p class="subtitle">🔄 Searching PubMed...</p></div>` : `
          <div class="flex flex-between items-center mb-4">
            <div class="flex gap-2 items-center">
              <button class="btn btn-ghost btn-sm" data-action="selectAllTopic">Select All</button>
              <button class="btn btn-ghost btn-sm" data-action="deselectAllTopic">Deselect All</button>
              <span class="badge badge-green">${S.topicSelected.size} selected</span>
            </div>
          </div>
          ${paperList}
        `}
      </div>
      <div class="results-footer">
        <div class="hint">Selected papers will be included in your analysis.</div>
        <div class="flex gap-2">
          <button class="btn btn-ghost" data-action="closeResults">Cancel</button>
          <button class="btn btn-green" data-action="confirmTopicSelection" ${S.topicSelected.size===0?'disabled':''}>
            ✓ Add ${S.topicSelected.size} Papers
          </button>
        </div>
      </div>
    </div>`;
}

function vPapersModule() {
  let paperList = S.resolvedPapers.map((p, i) =>
    paperCardHtml(p, { removable: true, removeAction: `data-action="removePaper" data-idx="${i}"` })
  ).join('');

  return `
    <div class="card">
      <div class="section-header"><div><h2>📄 Specific Papers</h2><p class="hint">Paste PMIDs or DOIs (one per line, or comma-separated)</p></div><span class="badge badge-purple">Module: Papers</span></div>
      <textarea id="pmids-input" rows="3" placeholder="Enter PMIDs or DOIs here, e.g.&#10;33482113&#10;10.1038/s41586-020-2649-2">${esc(S.pmidsText)}</textarea>
      <div class="flex gap-2 items-center mt-2">
        <button class="btn btn-primary btn-sm" data-action="validatePmids">🔍 Validate & Resolve</button>
        <span id="pmid-status" class="hint"></span>
      </div>
      ${S.resolvedPapers.length ? `
        <p class="label-sm mt-4 mb-2">PAPERS (${S.resolvedPapers.length})</p>
        <div style="max-height:400px;overflow-y:auto">${paperList}</div>
      ` : ''}
    </div>`;
}

function vAuthorsModule() {
  let authorCards = S.authors.map((a, ai) => {
    let papers = a.papers.map(p =>
      paperCardHtml(p, { checkbox: true, checked: a.selected.has(p.pmid), onToggle: `data-action="togglePaper" data-authoridx="${ai}" data-pmid="${p.pmid}"` })
    ).join('');
    return `
      <div class="author-card">
        <div class="author-header">
          <div><strong>👤 ${esc(a.name)}</strong> <span class="hint" style="margin-left:8px">${esc(a.status)}</span></div>
          <button class="btn btn-ghost btn-sm" data-action="removeAuthor" data-idx="${ai}" style="color:var(--red)">✕</button>
        </div>
        ${a.papers.length ? `<div style="max-height:300px;overflow-y:auto">${papers}</div>` : ''}
      </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="section-header"><div><h2>👥 Author Search</h2><p class="hint">Search PubMed by author name to find their papers</p></div><span class="badge badge-green">Module: Authors</span></div>
      <div class="flex gap-2 mb-4">
        <input type="text" id="author-name" placeholder="Author name (e.g. Smith J)" style="flex:1">
        <button class="btn btn-primary btn-sm" data-action="addAuthor">+ Add Author</button>
      </div>
      ${authorCards}
    </div>`;
}

function vColumns() {
  saveInputs();
  let rows = S.columns.map((c, i) =>
    `<div class="col-row" data-col-idx="${i}"><input type="text" class="col-name" value="${esc(c.name)}" placeholder="Column Name"><input type="text" class="col-desc" value="${esc(c.desc)}" placeholder="Extraction instructions"><button class="btn btn-ghost btn-sm" data-action="removeColumn" data-idx="${i}" style="color:var(--red)">✕</button></div>`
  ).join('');
  return `
    <div class="section-header"><div><h1>🧪 Gene Extraction Columns</h1><p class="subtitle">Define gene-specific data to extract. Paper metadata is auto-captured.</p></div><button class="btn btn-ghost btn-sm" onclick="saveColumns(); go('inputs')">← Back</button></div>
    <div class="card">
      <div class="flex gap-2 mb-2"><span class="label-sm" style="width:200px">Column Name</span><span class="label-sm">Extraction Instructions</span></div>
      ${rows}
      <button class="btn btn-ghost btn-sm mt-2" data-action="addColumn">+ Add Column</button>
    </div>
    <div class="text-center mt-4"><button class="btn btn-primary btn-lg" onclick="saveColumns(); go('review')">Next: Review & Run →</button></div>`;
}

function vReview() {
  const q = buildQuery();
  const allPmids = getAllSelectedPmids();
  const topicCount = S.topicSelected.size;
  const paperCount = S.resolvedPapers.filter(p => p.pmid).length;
  const authorCount = S.authors.reduce((s, a) => s + a.selected.size, 0);
  return `
    <div class="section-header"><div><h1>✅ Review & Run</h1></div><button class="btn btn-ghost btn-sm" onclick="go('columns')">← Back</button></div>
    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
        <div style="padding:16px;background:var(--brand-light);border-radius:var(--radius-sm);text-align:center">
          <div style="font-size:32px;font-weight:800;color:var(--brand)">${allPmids.length}</div>
          <div class="label-sm" style="margin-top:4px">Total Papers to Analyze</div>
        </div>
        <div style="padding:16px;background:var(--purple-bg);border-radius:var(--radius-sm);text-align:center">
          <div style="font-size:32px;font-weight:800;color:var(--purple)">${S.columns.length}</div>
          <div class="label-sm" style="margin-top:4px">Extraction Columns</div>
        </div>
      </div>
      ${S.protocol.topic && topicCount ? `<div class="flex items-center gap-2 mb-2"><span class="badge badge-brand">🔍 Topic</span> <span>${topicCount} papers from query: <code style="font-size:12px">${esc(q)}</code></span></div>` : ''}
      ${paperCount ? `<div class="flex items-center gap-2 mb-2"><span class="badge badge-purple">📄 Papers</span> <span>${paperCount} specific papers</span></div>` : ''}
      ${authorCount ? `<div class="flex items-center gap-2 mb-2"><span class="badge badge-green">👥 Authors</span> <span>${authorCount} papers from ${S.authors.length} author${S.authors.length>1?'s':''}</span></div>` : ''}
      ${allPmids.length === 0 ? `<p style="color:var(--red);margin-top:12px">⚠️ No papers selected. Go back and add papers to analyze.</p>` : ''}
    </div>
    <div class="text-center mt-4"><button class="btn btn-green btn-lg" data-action="runPipeline" ${allPmids.length===0?'disabled':''}>🚀 Analyze ${allPmids.length} Papers</button></div>`;
}

function vRunning() {
  return `
    <div class="text-center mb-4"><h1>🧬 Pipeline Running...</h1></div>
    <div class="step-track">${['🔍 Search','🔬 Screen','⚗️ Extract','📊 Synthesize'].map(s=>`<div class="step-item"><div class="step-circle">${s.split(' ')[0]}</div><span class="step-label">${s.split(' ')[1]}</span></div>`).join('')}</div>
    <div class="progress-bar"><div class="progress-bar-inner"></div></div>
    <div class="log-output" id="log-output">${S.logs.join('\n')}</div>
    <div class="text-center mt-4"><button class="btn btn-danger btn-sm" data-action="stopPipeline">⏹ Stop</button></div>`;
}

function vDone() {
  return `<div class="text-center">
    <h1 style="font-size:36px;margin-top:60px">${S.pipelineError?'❌':'✅'}</h1>
    <h1 style="margin:16px 0">${S.pipelineError?'Pipeline Error':'Results Ready!'}</h1>
    <p class="subtitle mb-4">${S.pipelineError?esc(S.pipelineError):'Your gene-disease associations have been extracted.'}</p>
    ${S.pipelineResult?`<p class="hint mb-4">Output: ${esc(S.pipelineResult)}</p>`:''}
    <button class="btn btn-primary btn-lg" onclick="go('protocol')">🔄 New Analysis</button>
  </div>`;
}

init();
</script>
</body>
</html>
